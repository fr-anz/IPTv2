<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>{% block title %}Personal Finance Analytics{% endblock %}</title>
		<link
			rel="stylesheet"
			href="{{ url_for('static', filename='css/styles.css') }}"
		/>
	</head>
	<body>
		<a class="skip-link" href="#dashboard-content">Skip to content</a>
		<header class="site-header">
			<a class="brand" href="{{ url_for('dashboard') }}">
				<span class="brand-mark">PF</span>
				<span>
					<strong>Personal Finance</strong>
					<small>Analytics dashboard</small>
				</span>
			</a>
			<nav class="site-nav" aria-label="Dashboard sections">
				<a href="#overview">Overview</a>
				<a href="#charts">Charts</a>
				<a href="#analysis">Analysis</a>
				<a href="#data-preview">Data</a>
			</nav>
		</header>

		<main id="dashboard-content">
			{% with messages = get_flashed_messages(with_categories=true) %} {%
			if messages %}
			<div class="flash-stack">
				{% for category, message in messages %}
				<div class="flash {{ category }}">{{ message }}</div>
				{% endfor %}
			</div>
			{% endif %} {% endwith %} {% block content %}{% endblock %}
		</main>
	</body>
</html>
